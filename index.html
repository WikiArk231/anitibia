<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Anitibia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main">

    <img src="images/logo.png" class="logo" alt="Logo">

    <div class="cards">

      <!-- BSROT -->
      <div class="card" style="background-image: url('images/bsrot-bg.png');">
        <div class="overlay"></div>
        <div class="card-content">
          <div class="status online">ONLINE (Beta Test)</div>
          <h2 class="bsrot-title">Bleach Shadows Rising</h2>
          <p>Entre no mundo de Bleach e crie sua própria jornada!</p>
          <div class="bottom">
            <a href="https://bleachshadowsrising.com">ENTRAR</a>
          </div>
        </div>
      </div>

      <!-- CDZ -->
      <div class="card" style="background-image: url('images/cdz-bg.png');">
        <div class="overlay purple"></div>
        <div class="card-content">
          <div class="status coming">EM BREVE</div>
          <h2 class="cdz-title">Saint Seiya Online</h2>
          <p>Estamos construindo o melhor servidor de Saint Seiya. Prepare-se.</p>
          <div class="bottom">
            <span>Loading...</span>
            <button disabled>AGUARDE</button>
          </div>
        </div>
      </div>

    </div>

  </div>

</body>

</html>
